    <!-- Dark base background: applies before the CSS bundle/React so there is
         no white flash on launch and safe-area/overscroll gaps stay dark. -->
    <style>
      html, body { margin: 0; }
      /* Dark base only for the INSTALLED app (prevents white launch flash and
         keeps safe-area/overscroll gaps dark). In a normal browser tab the
         desktop site keeps its light background. */
      @media (display-mode: standalone), (display-mode: fullscreen), (display-mode: minimal-ui) {
        html, body { background-color: #0b1220; }
      }
      #root { min-height: 100dvh; }
    </style>

    <!-- Capture the install event early (it can fire before React mounts) so the
         in-app "Install app" button can trigger it on demand. -->
    <script>
      window.__deferredInstallPrompt = null;
      window.addEventListener("beforeinstallprompt", function (e) {
        e.preventDefault();
        window.__deferredInstallPrompt = e;
        window.dispatchEvent(new Event("installpromptready"));
      });
    </script>
